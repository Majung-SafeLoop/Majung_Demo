<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마중 NFC</title>

  <!-- CSS 연결 -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- 스위치 영역 -->
  <div class="top-bar">
    <div class="toggle" id="toggle"></div>
    <span id="statusText"></span>
  </div>

  <!-- 메인 카드 -->
  <div class="main-card">
    <div class="siren">🚨</div>
    <h2>도움이 필요한 어르신입니다.</h2>
    <p>안전하게 귀가할 수 있도록 도와주세요.</p>
  </div>

  <!-- 설명 -->
  <p class="desc">
    📞 아래 버튼을 누르면 바로 전화가 연결됩니다.
  </p>

  <!-- 버튼 -->
  <div class="btn-group">
    <a id="callBtn" class="btn red">보호자<br>연결</a>
    <a href="tel:182" class="btn orange">실종신고 182</a>
    <a href="tel:112" class="btn blue">경찰연결 112</a>
  </div>

  <!-- 💬 안내 -->
  <div class="speech">
    <b>이렇게 말씀해 주세요!</b>
    <p>
      “안심밴드를 통해 연락드립니다.<br>
      OOO 장소에서 어르신을 발견했습니다.”
    </p>
  </div>

  <!-- 정보 이동 -->
  <a id="infoBtn" href="user.html" class="info-link">
    👤 어르신 정보 확인하기
  </a>

  <!-- 푸터 -->
  <div class="footer">
    <p class="brand">🧡 마중안심밴드</p>
    <p class="small">1:1 문의하기 · 소개 · 이용약관 · 개인정보처리방침</p>
    <p class="small">주식회사 마중 사업자 번호: 000-00-00000</p>
    <p class="small">주소: 서울특별시 이화여대길 52</p>
    <p class="small">Copyright ⓒ BUY. All rights reserved.</p>
  </div>

</div>

<!-- JS 연결 -->
<script src="script.js"></script>

</body>
</html>
