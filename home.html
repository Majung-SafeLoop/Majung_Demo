<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 홈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        /* 초기 로딩 시 깜빡임 방지를 위해 본문을 숨김 */
        #main-content { opacity: 0; transition: opacity 0.3s ease-in; }
    </style>
</head>
<body class="bg-gray-50 flex justify-center text-gray-800">
    <div id="main-content" class="w-full max-w-md min-h-screen bg-white shadow-lg flex flex-col relative">
        
        <div id="missing-top-banner" class="hidden bg-red-600 text-white text-center py-3 text-sm font-bold sticky top-0 z-50">
            ● 현재, 실종 신고가 접수된 어르신입니다. ●
        </div>

        <div class="p-6 flex flex-col items-center">
            <div class="text-center mt-8 mb-10">
                <h1 class="text-2xl font-black text-gray-900 mb-2">마중안심밴드</h1>
                <p class="text-gray-500 text-sm">안심밴드를 통해 소중한 가족을 찾습니다.</p>
            </div>

            <div id="status-card-area" class="w-full mb-8 text-center">
                <div id="normal-card" class="bg-blue-50 border border-blue-100 rounded-3xl p-10 shadow-sm">
                    <div class="text-5xl mb-4">💙</div>
                    <p class="text-blue-700 font-bold text-lg">어르신 정보를 확인하시겠습니까?</p>
                </div>

                <div id="missing-card" class="hidden bg-red-50 border border-red-100 rounded-3xl p-10 shadow-sm">
                    <div class="text-6xl mb-4">🚨</div>
                    <h2 class="text-2xl font-extrabold text-gray-900 mb-2 leading-tight">도움이 필요한<br>어르신입니다.</h2>
                    <p class="text-gray-600 text-sm">안전하게 귀가할 수 있도록 도와주세요.</p>
                </div>
            </div>

            <div class="w-full mt-auto mb-6 px-2">
                <div id="missing-actions" class="hidden">
                    <div class="flex items-center mb-5 text-sm text-pink-600 font-medium">
                        <span class="mr-2 text-base">📞</span> 아래 버튼을 누르면 바로 전화가 연결됩니다.
                    </div>
                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <a id="call-guardian" href="#" class="bg-blue-600 text-white text-center py-5 rounded-2xl shadow-lg flex flex-col justify-center items-center font-bold">
                            보호자 연결
                        </a>
                        <a href="tel:182" class="bg-orange-500 text-white text-center py-5 rounded-2xl shadow-lg flex flex-col justify-center items-center font-bold">
                            182
                        </a>
                        <a href="tel:112" class="bg-red-600 text-white text-center py-5 rounded-2xl shadow-lg flex flex-col justify-center items-center font-bold">
                            112
                        </a>
                    </div>
                    <div class="bg-yellow-50 border border-yellow-100 rounded-2xl p-5 mb-6 shadow-sm">
                        <p class="text-base font-bold text-gray-900 mb-2">이렇게 말씀해 주세요!</p>
                        <p class="text-sm text-gray-700 leading-relaxed text-left">
                            "안심밴드를 통해 연락드립니다.<br>
                            OOO 장소에서 어르신을 발견했습니다."
                        </p>
                    </div>
                </div>

                <button onclick="location.href='info.html'" class="w-full bg-white text-blue-600 py-5 rounded-2xl font-bold text-lg border-2 border-blue-600 shadow-sm mb-4">
                    어르신 정보 확인하기
                </button>
                <button onclick="location.href='admin.html'" class="w-full text-center text-gray-400 py-2 text-xs underline underline-offset-2">
                    보호자 관리 모드
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBphUEAQmK1XXYnNcQYK5NEOFDfxleNaAQ",
            authDomain: "majung-260402v1.firebaseapp.com",
            projectId: "majung-260402v1",
            storageBucket: "majung-260402v1.firebasestorage.app",
            messagingSenderId: "18043440169",
            appId: "1:18043440169:web:f5f131e3fa0426ef126038",
            measurementId: "G-4CHSF7NFGR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "elders", "elder01"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const isMissing = data.isMissing;
                const content = document.getElementById('main-content');

                // 1. 상태에 맞게 UI 미리 세팅
                if (isMissing) {
                    document.getElementById('missing-top-banner').classList.remove('hidden');
                    document.getElementById('normal-card').classList.add('hidden');
                    document.getElementById('missing-card').classList.remove('hidden');
                    document.getElementById('missing-actions').classList.remove('hidden');
                } else {
                    document.getElementById('missing-top-banner').classList.add('hidden');
                    document.getElementById('normal-card').classList.remove('hidden');
                    document.getElementById('missing-card').classList.add('hidden');
                    document.getElementById('missing-actions').classList.add('hidden');
                }

                document.getElementById('call-guardian').href = `tel:${data.guardian_phone}`;

                // 2. 세팅이 끝난 후 화면을 부드럽게 보여줌
                content.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
