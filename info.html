<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 상세정보</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center text-gray-800">
    <div class="w-full max-w-md min-h-screen bg-white shadow-lg flex flex-col">
        <div class="p-4 border-b flex items-center">
            <button onclick="location.href='home.html'" class="mr-3">←</button>
            <h1 class="font-bold">어르신 정보</h1>
        </div>

        <div class="p-6">
            <div class="bg-gray-50 rounded-3xl p-6 border border-gray-100 mb-6">
                <h2 id="name" class="text-2xl font-bold mb-6">로딩 중...</h2>
                <div class="space-y-4">
                    <div><p class="text-xs text-gray-400">나이</p><p id="age" class="font-bold">-</p></div>
                    <div><p class="text-xs text-gray-400">주소</p><p id="address" class="font-bold">-</p></div>
                    <div><p class="text-xs text-gray-400">관할 경찰서</p><p id="police" class="font-bold">-</p></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <a id="call-guardian" href="#" class="bg-blue-600 text-white text-center py-4 rounded-2xl font-bold">보호자 연결</a>
                <a id="call-center" href="#" class="bg-green-600 text-white text-center py-4 rounded-2xl font-bold">센터 연결</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* 본인의 Config 복사 */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const docRef = doc(db, "elders", "elder01");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('name').innerText = data.name;
            document.getElementById('age').innerText = data.age + "세";
            document.getElementById('address').innerText = data.address;
            document.getElementById('police').innerText = data.police_station;
            document.getElementById('call-guardian').href = "tel:" + data.guardian_phone;
            document.getElementById('call-center').href = "tel:" + data.center_phone;
        }
    </script>
</body>
</html>
