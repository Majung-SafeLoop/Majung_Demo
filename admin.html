<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 보호자 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .hidden { display: none !important; }
        /* 숫자 키패드용 스타일 */
        .keypad-btn { @apply h-16 w-16 flex items-center justify-center text-2xl font-bold bg-gray-50 rounded-full active:bg-gray-200 transition-colors; }
    </style>
</head>
<body class="bg-gray-50 flex justify-center text-gray-800 font-sans">
    <div class="w-full max-w-md min-h-screen bg-white shadow-lg flex flex-col relative overflow-hidden">
        
        <div id="login-layer" class="absolute inset-0 z-[100] bg-white flex flex-col items-center p-8">
            <div class="mt-20 text-center mb-12">
                <h2 class="text-2xl font-black mb-2">보호자 인증</h2>
                <p class="text-gray-400 text-sm">설정하신 PIN 번호 4자리를 입력해 주세요.</p>
            </div>
            
            <div class="flex space-x-4 mb-12">
                <div id="dot-0" class="w-4 h-4 rounded-full bg-gray-200"></div>
                <div id="dot-1" class="w-4 h-4 rounded-full bg-gray-200"></div>
                <div id="dot-2" class="w-4 h-4 rounded-full bg-gray-200"></div>
                <div id="dot-3" class="w-4 h-4 rounded-full bg-gray-200"></div>
            </div>

            <div class="grid grid-cols-3 gap-6">
                <button onclick="pressKey('1')" class="keypad-btn">1</button>
                <button onclick="pressKey('2')" class="keypad-btn">2</button>
                <button onclick="pressKey('3')" class="keypad-btn">3</button>
                <button onclick="pressKey('4')" class="keypad-btn">4</button>
                <button onclick="pressKey('5')" class="keypad-btn">5</button>
                <button onclick="pressKey('6')" class="keypad-btn">6</button>
                <button onclick="pressKey('7')" class="keypad-btn">7</button>
                <button onclick="pressKey('8')" class="keypad-btn">8</button>
                <button onclick="pressKey('9')" class="keypad-btn">9</button>
                <button onclick="location.href='home.html'" class="text-sm font-bold text-gray-400">취소</button>
                <button onclick="pressKey('0')" class="keypad-btn">0</button>
                <button onclick="pressKey('back')" class="text-sm font-bold text-blue-600">지우기</button>
            </div>
        </div>

        <div id="admin-main" class="hidden flex flex-col h-full">
            <div class="flex justify-between items-center px-6 py-4 border-b">
                <h1 class="text-lg font-bold">보호자 관리</h1>
                <button onclick="location.reload()" class="text-gray-400 text-sm font-medium">로그아웃</button>
            </div>

            <div class="flex border-b text-center text-[15px] text-gray-400">
                <button id="tab-missing" onclick="switchTab('missing')" class="flex-1 py-4 tab-active">실종 상태</button>
                <button id="tab-info" onclick="switchTab('info')" class="flex-1 py-4">어르신 정보</button>
                <button id="tab-pin" onclick="switchTab('pin')" class="flex-1 py-4">PIN 변경</button>
            </div>

            <div class="p-6 flex-1 overflow-y-auto pb-24">
                <div id="content-missing" class="flex flex-col items-center">
                    <div class="w-full mb-10 text-center bg-gray-50 border border-gray-100 rounded-[2rem] p-12 shadow-sm mt-8">
                        <p class="text-gray-400 text-sm mb-2">현재 상태</p>
                        <h2 id="status-text" class="text-3xl font-black">로딩 중...</h2>
                    </div>
                    <button id="toggle-btn" class="w-full py-5 rounded-3xl font-black text-xl shadow-lg transition-all active:scale-95"></button>
                </div>

                <div id="content-info" class="hidden space-y-5">
                    <div><label class="text-xs text-gray-500 font-bold mb-1 block">이름</label>
                        <input id="info-name" type="text" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none"></div>
                    <div><label class="text-xs text-gray-500 font-bold mb-1 block">보호자 연락처</label>
                        <input id="info-guardian-phone" type="tel" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none"></div>
                    <button onclick="saveElderInfo()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-lg mt-4">저장하기</button>
                </div>

                <div id="content-pin" class="hidden space-y-6">
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-6 text-sm text-gray-500 text-center">PIN은 숫자 4자리로 설정해 주세요.</div>
                    <input id="new-pin" type="password" maxlength="4" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none" placeholder="새 PIN">
                    <input id="confirm-pin" type="password" maxlength="4" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none" placeholder="새 PIN 확인">
                    <button onclick="changePin()" id="pin-btn" class="w-full bg-gray-300 text-white py-5 rounded-3xl font-black text-lg shadow-sm" disabled>PIN 변경하기</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBphUEAQmK1XXYnNcQYK5NEOFDfxleNaAQ",
            authDomain: "majung-260402v1.firebaseapp.com",
            projectId: "majung-260402v1",
            storageBucket: "majung-260402v1.firebasestorage.app",
            messagingSenderId: "18043440169",
            appId: "1:18043440169:web:f5f131e3fa0426ef126038",
            measurementId: "G-4CHSF7NFGR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "elders", "elder01");

        let correctPin = ""; // DB에서 가져올 정답 PIN
        let inputPin = "";   // 사용자가 입력중인 PIN

        // --- [로그인 로직] ---
        async function loadConfig() {
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                correctPin = docSnap.data().pin;
            }
        }
        loadConfig();

        window.pressKey = (key) => {
            if (key === 'back') {
                inputPin = inputPin.slice(0, -1);
            } else if (inputPin.length < 4) {
                inputPin += key;
            }
            updatePinDots();

            if (inputPin.length === 4) {
                if (inputPin === correctPin) {
                    document.getElementById('login-layer').classList.add('hidden');
                    document.getElementById('admin-main').classList.remove('hidden');
                } else {
                    alert("PIN 번호가 일치하지 않습니다.");
                    inputPin = "";
                    updatePinDots();
                }
            }
        };

        function updatePinDots() {
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i < inputPin.length) {
                    dot.classList.replace('bg-gray-200', 'bg-blue-600');
                } else {
                    dot.classList.replace('bg-blue-600', 'bg-gray-200');
                }
            }
        }

        // --- [탭 및 데이터 로직 (기존과 동일)] ---
        let currentMissingStatus = false;
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                currentMissingStatus = data.isMissing;
                correctPin = data.pin; // PIN 변경 시 즉시 반영

                const statusText = document.getElementById('status-text');
                const toggleBtn = document.getElementById('toggle-btn');
                
                if (currentMissingStatus) {
                    statusText.innerText = "실종 신고 중";
                    statusText.className = "text-3xl font-black text-red-600";
                    toggleBtn.innerText = "신고 해제하기";
                    toggleBtn.className = "w-full py-5 rounded-3xl font-black text-xl shadow-lg bg-blue-600 text-white";
                } else {
                    statusText.innerText = "정상 상태";
                    statusText.className = "text-3xl font-black text-blue-600";
                    toggleBtn.innerText = "실종 신고 등록하기";
                    toggleBtn.className = "w-full py-5 rounded-3xl font-black text-xl shadow-lg bg-red-600 text-white";
                }

                document.getElementById('info-name').value = data.name || "";
                document.getElementById('info-guardian-phone').value = data.guardian_phone || "";
            }
        });

        window.toggleMissing = async () => {
            await updateDoc(docRef, { isMissing: !currentMissingStatus });
        };
        document.getElementById('toggle-btn').onclick = window.toggleMissing;

        window.switchTab = (tab) => {
            ['missing', 'info', 'pin'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        };

        // PIN 변경 저장 로직 등 나머지 함수들은 이전과 동일하게 유지됩니다.
    </script>
</body>
</html>
