<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 보호자 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center font-sans">
    <div class="w-full max-w-md min-h-screen bg-white shadow-lg flex flex-col">
        <div class="p-5 border-b flex justify-between items-center bg-white sticky top-0 z-10">
            <h1 class="font-bold text-lg text-gray-900">보호자 관리 모드</h1>
            <button id="btn-home" class="text-sm font-bold text-gray-400">홈으로</button>
        </div>

        <div class="p-6 flex-1">
            <div id="status-card" class="rounded-[2.5rem] p-10 text-center border-2 mb-8 transition-all">
                <p id="status-text" class="text-xl font-black mb-2">상태 확인 중...</p>
                <p id="update-time" class="text-xs text-gray-400 font-medium"></p>
            </div>

            <button id="btn-toggle" class="w-full py-6 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all mb-8">
                상태 변경하기
            </button>

            <div class="bg-blue-50 border border-blue-100 rounded-3xl p-6">
                <p class="text-blue-900 font-black mb-2">💡 관리자 안내</p>
                <ul class="text-sm text-blue-700 space-y-2 font-medium leading-relaxed">
                    <li>• '실종 신고' 시 메인 화면이 빨간색으로 변합니다.</li>
                    <li>• 누군가 태깅 시 보호자님께 위치 알림이 전송됩니다.</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyARCEpqFrnnCg6bbDzC7etXK_Ypnyc_1yY",
            projectId: "safeloop-majung"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const urlParams = new URLSearchParams(window.location.search);
        const elderId = urlParams.get('id') || "demo";
        const docRef = doc(db, "Users", elderId);
        
        document.getElementById('btn-home').onclick = () => location.href = `index.html?id=${elderId}`;

        let currentStatus = false;

        // 실시간 상태 반영
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                currentStatus = data.isMissing;
                const card = document.getElementById('status-card');
                const text = document.getElementById('status-text');
                const btn = document.getElementById('btn-toggle');
                
                if (currentStatus) {
                    card.className = "rounded-[2.5rem] p-10 text-center border-2 border-red-200 bg-red-50";
                    text.innerText = "🚨 실종 신고 상태";
                    text.className = "text-xl font-black mb-2 text-red-600";
                    btn.innerText = "복귀 완료 (정상 전환)";
                    btn.className = "w-full bg-gray-900 text-white py-6 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all";
                } else {
                    card.className = "rounded-[2.5rem] p-10 text-center border-2 border-green-200 bg-green-50";
                    text.innerText = "✅ 정상 보호 상태";
                    text.className = "text-xl font-black mb-2 text-green-600";
                    btn.innerText = "실종 신고 등록하기";
                    btn.className = "w-full bg-red-600 text-white py-6 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all";
                }
            }
        });

        // 상태 변경 로직
        document.getElementById('btn-toggle').onclick = async () => {
            const confirmMsg = currentStatus ? "정상 상태로 변경하시겠습니까?" : "실종 신고를 등록하시겠습니까?";
            if (confirm(confirmMsg)) {
                await updateDoc(docRef, { isMissing: !currentStatus });
            }
        };
    </script>
</body>
</html>
